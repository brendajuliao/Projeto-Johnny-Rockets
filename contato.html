    <div class="form-container">

      <title>Formulário de Delivery</title>
      <style>
        form {
          display: flex;
          flex-direction: column;
          gap: 10px;
          width: 300px;
          margin: 0 auto;
        }

        label {
          font-size: 17px;
        }

        input {
          padding: 8px;
          font-size: 14px;
          border: 1px;
          border-radius: 4px;
        }

        button {
          padding: 10px;
          background-color: #c51818;
          color: white;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          font-size: 14px;
        }

        button:hover {
          background-color: #e01313;
        }
      </style>

      <body>

        <form action="salvar_usuario.php" method="POST">
          <script>
            function msg() {
              alert("Dados salvos com sucesso!");
            }
          </script>
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required>

          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" required>

          <label for="cep">Cep:</label>
          <input type="text" id="cep" name="cep" required>

          <label for="pedido"> Nº Pedido:</label>
          <input type="text" id="pedido" name="pedido" required>

          <br>
          <input type="button" style="background-color: #e01313;" value="Salvar" onclick="msg()">
          <script>
            function msg() {
              alert("Dados salvos com sucesso!");
            }
          </script>
        </form>

        <script>
          document.getElementById("formDelivery").addEventListener("submit", function (event) {
            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const telefone = document.getElementById("telefone").value;
            const cep = document.getElementById("cep").value;
            const pedido = document.getElementById("pedido").value;

            console.log({
              nome: nome,
              telefone: telefone,
              cep: cep,
              pedido: pedido
            });

            document.getElementById("formDelivery").reset();
          });
        </script>
